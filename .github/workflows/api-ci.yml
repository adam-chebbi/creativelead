name: API — CI & Deploy

on:
  push:
    branches: [main, phase-1-api-bridge]
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'

defaults:
  run:
    working-directory: api

jobs:
  typecheck-and-build:
    name: TypeScript Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:x@localhost:5432/placeholder' }}
          DIRECT_URL:   ${{ secrets.DIRECT_URL   || 'postgresql://placeholder:x@localhost:5432/placeholder' }}

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: typecheck-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Railway deployment
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { deploymentCreate(input:{serviceId:\"${{ secrets.RAILWAY_SERVICE_ID }}\"}){id}}"}' \
            https://backboard.railway.app/graphql/v2
