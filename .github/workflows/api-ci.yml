name: API — CI & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'

defaults:
  run:
    working-directory: api

jobs:
  typecheck-and-build:
    name: TypeScript Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:x@localhost:5432/placeholder
          DIRECT_URL:   postgresql://placeholder:x@localhost:5432/placeholder

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: typecheck-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script:   bash /var/www/autoreach/deploy.sh
