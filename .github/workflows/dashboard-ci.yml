name: Dashboard — CI & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'

defaults:
  run:
    working-directory: dashboard

jobs:
  build:
    name: TypeCheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npm run typecheck
        env:
          NEXTAUTH_SECRET:      placeholder
          NEXTAUTH_URL:         https://leads.creativecomet.tn
          NEXT_PUBLIC_API_URL:  https://leads.creativecomet.tn/api
          DATABASE_URL:         postgresql://placeholder:x@localhost:5432/placeholder
          DIRECT_URL:           postgresql://placeholder:x@localhost:5432/placeholder
          GOOGLE_CLIENT_ID:     placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          GITHUB_CLIENT_ID:     placeholder
          GITHUB_CLIENT_SECRET: placeholder

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET:      placeholder
          NEXTAUTH_URL:         https://leads.creativecomet.tn
          NEXT_PUBLIC_API_URL:  https://leads.creativecomet.tn/api
          DATABASE_URL:         postgresql://placeholder:x@localhost:5432/placeholder
          DIRECT_URL:           postgresql://placeholder:x@localhost:5432/placeholder
          GOOGLE_CLIENT_ID:     placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          GITHUB_CLIENT_ID:     placeholder
          GITHUB_CLIENT_SECRET: placeholder

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:    ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:     ${{ secrets.VPS_SSH_KEY }}
          script:  bash /var/www/autoreach/deploy.sh
