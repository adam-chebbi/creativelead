name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next
            public
            package.json
            node_modules/.prisma
            next.config.js
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Deploy to VPS
        run: echo "Add your deploy script here — scp or rsync .next to the VPS, then restart the process manager"
