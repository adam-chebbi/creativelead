name: Worker — Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run dist:win
        env:
          GH_TOKEN:                ${{ secrets.GITHUB_TOKEN }}
          API_BASE_URL:            https://leads.creativecomet.tn/api
          WORKER_SECRET:           ${{ secrets.WORKER_SECRET }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: worker/release/*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run dist:mac
        env:
          GH_TOKEN:                ${{ secrets.GITHUB_TOKEN }}
          API_BASE_URL:            https://leads.creativecomet.tn/api
          WORKER_SECRET:           ${{ secrets.WORKER_SECRET }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: worker/release/*.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Linux deps
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run dist:linux
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          API_BASE_URL:  https://leads.creativecomet.tn/api
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: worker/release/*.AppImage

  release:
    name: Create GitHub Release & Publish to VPS
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.dmg
            artifacts/linux-installer/*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload installers to VPS download directory ─────────────
      - name: Upload installers to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "artifacts/windows-installer/*.exe,artifacts/macos-installer/*.dmg,artifacts/linux-installer/*.AppImage"
          target:   "/var/www/autoreach/public/downloads/"
          strip_components: 2

      # ── Write release manifest for /download page ───────────────
      - name: Write release manifest on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            VERSION="${{ github.ref_name }}"
            cat > /var/www/autoreach/public/downloads/manifest.json <<EOF
            {
              "version": "${VERSION}",
              "windows": "/downloads/AutoReach-${VERSION}.exe",
              "macos":   "/downloads/AutoReach-${VERSION}.dmg",
              "linux":   "/downloads/AutoReach-${VERSION}.AppImage",
              "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }
            EOF
            echo "Manifest written for ${VERSION}"
