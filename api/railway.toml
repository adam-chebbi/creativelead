[build]
  builder = "NIXPACKS"
  buildCommand = "npm ci && npm run db:generate && npm run build"

[deploy]
  startCommand = "npm run db:migrate && node dist/index.js"
  healthcheckPath = "/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[[services]]
  name = "autoreach-api"
