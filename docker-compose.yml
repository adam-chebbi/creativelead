version: '3.8'

# ── AutoReach V2 — Production Stack ──────────────────────────────
# Four containers, one network, one Nginx entry point.
# All traffic enters via nginx:443 → proxied internally.
# postgres is NOT exposed externally — only reachable on autoreach_net.

services:

  # ── 1. PostgreSQL Database ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - autoreach_net

  # ── 1.5 PgBouncer (Connection Pooling) ─────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    depends_on:
      - postgres
    networks:
      - autoreach_net

  # ── 2. API Bridge (Node/Express) ───────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - pgbouncer
    environment:
      NODE_ENV:          production
      PORT:              3070
      DATABASE_URL:      postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?pgbouncer=true
      DIRECT_URL:        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET:   ${NEXTAUTH_SECRET}
      ENCRYPTION_KEY:    ${ENCRYPTION_KEY}
      WORKER_SECRET:     ${WORKER_SECRET}
      APP_BASE_URL:      https://leads.creativecomet.tn
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
    networks:
      - autoreach_net

  # ── 3. Dashboard (Next.js Standalone) ─────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - pgbouncer
      - api
    environment:
      NODE_ENV:              production
      PORT:                  3040
      NEXTAUTH_URL:          https://leads.creativecomet.tn
      NEXTAUTH_SECRET:       ${NEXTAUTH_SECRET}
      DATABASE_URL:          postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?pgbouncer=true
      DIRECT_URL:            postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXT_PUBLIC_API_URL:   https://leads.creativecomet.tn/api
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID:      ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET:  ${GITHUB_CLIENT_SECRET}
    networks:
      - autoreach_net
    # Internal only — nginx proxies / to this service

  # ── 4. Nginx (Reverse Proxy + SSL Termination) ─────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/autoreach.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./public/downloads:/var/www/autoreach/public/downloads:ro
    networks:
      - autoreach_net

networks:
  autoreach_net:
    driver: bridge
