# ── AutoReach — Nginx Reverse Proxy ──────────────────────────────
# Port 80: ACME challenge only, all other traffic → HTTPS
# Port 443: SSL terminated, routes:
#   /api/dashboard/stream → SSE (no buffering)
#   /api/               → api:3070
#   /downloads/         → static installer files
#   /                   → dashboard:3040

# ── HTTP — ACME only ──────────────────────────────────────────────
server {
    listen 80;
    server_name leads.creativecomet.tn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name leads.creativecomet.tn;

    ssl_certificate     /etc/letsencrypt/live/leads.creativecomet.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leads.creativecomet.tn/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Shared proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow larger payloads (CSV imports)
    client_max_body_size 20m;

    # ── SSE — must be before the general /api/ block ──────────────
    location /api/dashboard/stream {
        proxy_pass          http://api:3070;
        proxy_http_version  1.1;

        # Disable all buffering — mandatory for SSE
        proxy_buffering     off;
        proxy_cache         off;
        add_header          X-Accel-Buffering no;

        # Keep connection alive for up to 1 hour
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        proxy_set_header Connection "";
    }

    # ── API Bridge ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3070;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 60s;
    }

    # ── Electron Installer Downloads ──────────────────────────────
    location /downloads/ {
        alias      /var/www/autoreach/public/downloads/;
        autoindex  off;
        expires    7d;
        add_header Cache-Control "public";
    }

    # ── Next.js Dashboard ─────────────────────────────────────────
    location / {
        proxy_pass         http://dashboard:3040;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
