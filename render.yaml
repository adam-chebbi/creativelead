services:
  - type: web
    name: autoreach
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_PASSWORD
        value: changeme
      - key: BASE_URL
        value: https://app.autoreach.dev
      - key: GROQ_API_KEY
        value: your-groq-api-key
      - key: RESEND_API_KEY
        value: your-resend-api-key
      - key: FROM_EMAIL
        value: onboarding@resend.dev
      - key: GITHUB_CLIENT_ID
        value: your-github-client-id
      - key: GITHUB_CLIENT_SECRET
        value: your-github-client-secret
      - key: DISCORD_CLIENT_ID
        value: your-discord-client-id
      - key: DISCORD_CLIENT_SECRET
        value: your-discord-client-secret
      - key: GOOGLE_CLIENT_ID
        value: your-google-client-id
      - key: GOOGLE_CLIENT_SECRET
        value: your-google-client-secret
      - key: GOOGLE_MAPS_API_KEY
        value: your-google-maps-api-key
      - key: TURSO_DB_URL
        value: your-turso-db-url
      - key: TURSO_AUTH_TOKEN
        value: your-turso-auth-token
