{% extends "base.html" %}
{% block title %}Add Lead — AutoReach{% endblock %}
{% block page_title %}Add Lead{% endblock %}
{% block page_subtitle %}Manually add a business to your pipeline{% endblock %}

{% block content %}
<div style="max-width:560px;">
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Business Name <span style="color:var(--coral);">*</span></label>
        <input type="text" name="name" required placeholder="e.g. Acme Coffee Shop" autofocus>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Address</label>
          <input type="text" name="address" placeholder="123 Main St, Athens">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" name="phone" placeholder="+30 210 000 0000">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Website</label>
        <input type="url" name="website" placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" placeholder="contact@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea name="notes" placeholder="Any notes about this lead…" style="min-height:80px;"></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">+ Add Lead</button>
        <a href="{{ url_for('leads') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
