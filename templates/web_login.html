<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AutoReach</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      width: 100%;
      max-width: 360px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px; height: 44px;
      background: rgba(94,234,212,.1);
      border: 1px solid rgba(94,234,212,.2);
      border-radius: 12px;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.02em;
    }
    .logo p { font-size: 13px; color: #475569; margin-top: 4px; }

    .card {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 28px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    input[type=password] {
      width: 100%;
      padding: 10px 12px;
      background: #0a0a0f;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .12s, box-shadow .12s;
      margin-bottom: 16px;
    }
    input[type=password]:focus {
      border-color: #5eead4;
      box-shadow: 0 0 0 3px rgba(94,234,212,.08);
    }

    button {
      width: 100%;
      padding: 11px;
      background: #5eead4;
      border: none;
      border-radius: 8px;
      color: #0a0a0f;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .12s;
    }
    button:hover { opacity: .88; }

    .flash-error {
      background: rgba(251,113,133,.08);
      border: 1px solid rgba(251,113,133,.2);
      color: #fb7185;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-mark">◎</div>
      <h1>AutoReach</h1>
      <p>Sign in to your dashboard</p>
    </div>
    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash-error">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST" autocomplete="on">
        <label for="password">Dashboard password</label>
        <input type="password" id="password" name="password"
               autofocus placeholder="••••••••"
               autocomplete="current-password">
        <button type="submit">Sign in →</button>
      </form>
    </div>
  </div>
</body>
</html>
